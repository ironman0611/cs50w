<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search</title>
    <link rel="stylesheet" href="searchstyle.css">
</head>
<body>
    <div class="header">
        <div class="adv">
            <a href="adv_search.html">To Advance Search</a>
        </div>
        <div class="image">
            <a href="search_image.html">To Image Search</a>
        </div>
    </div>
    <form action="https://www.google.com/search" method="get">
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
        <input class="search-box" type="text" name="q" autocomplete="off">
        <input class="search-button" type="submit" name="btnK" value="Google Search">
        <input class="search-lucky" type="submit" name="btnI" value="I'm Feeling Lucky">
    </form>
</body>
</html>
